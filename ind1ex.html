<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOKI Restaurant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --gold: #D4AF37;
  --gold2: #F0C060;
  --dark: #0A0A0A;
  --dark2: #111111;
  --dark3: #1A1A1A;
  --dark4: #222222;
  --red: #C0392B;
  --green: #27AE60;
  --text: #F0EDE8;
  --muted: #888;
  --border: rgba(212,175,55,0.2);
  --radius: 16px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Tajawal', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body.ltr { direction: ltr; font-family: 'Outfit', sans-serif; }

/* ===== NOISE OVERLAY ===== */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:0.4;
}

/* ===== PAGES ===== */
.page { display:none; min-height:100vh; position:relative; z-index:1; }
.page.active { display:block; }

/* ===== LANDING ===== */
#landing {
  background: linear-gradient(135deg, #0A0A0A 0%, #1A1000 50%, #0A0A0A 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:40px 20px; gap:32px;
}
#landing.active { display:flex; }

.logo-container { position:relative; }
.logo-glow {
  position:absolute; inset:-30px;
  background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%);
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

.logo-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 20vw, 160px);
  letter-spacing: 20px;
  background: linear-gradient(135deg, #D4AF37, #F0C060, #D4AF37);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height:1;
  position:relative;
  text-shadow: none;
  filter: drop-shadow(0 0 30px rgba(212,175,55,0.4));
}
.logo-sub {
  font-size:14px; letter-spacing:6px; color:var(--gold);
  text-transform:uppercase; opacity:0.8;
  font-family: 'Outfit', sans-serif;
}

.lang-toggle {
  display:flex; gap:8px; background:var(--dark3);
  padding:4px; border-radius:50px; border:1px solid var(--border);
}
.lang-btn {
  padding:8px 20px; border-radius:50px; border:none;
  cursor:pointer; font-family:inherit; font-size:14px; font-weight:600;
  transition:all 0.3s; color:var(--muted); background:transparent;
}
.lang-btn.active {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--dark);
}

.landing-card {
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px;
  width: min(400px, 90vw);
  box-shadow: var(--shadow), inset 0 1px 0 rgba(212,175,55,0.1);
}
.landing-title {
  font-size:28px; font-weight:900; margin-bottom:8px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.landing-sub { color:var(--muted); font-size:14px; margin-bottom:28px; }

.role-cards { display:flex; gap:12px; margin-bottom:24px; }
.role-card {
  flex:1; padding:16px 12px; border-radius:16px;
  border:2px solid var(--border); cursor:pointer;
  transition:all 0.3s; background:var(--dark4);
  text-align:center;
}
.role-card:hover, .role-card.selected {
  border-color: var(--gold);
  background: rgba(212,175,55,0.1);
  transform: translateY(-2px);
}
.role-icon { font-size:32px; display:block; margin-bottom:8px; }
.role-name { font-size:13px; font-weight:700; color:var(--gold); }

/* ===== FORM ===== */
.form-group { margin-bottom:16px; }
.form-label { font-size:13px; color:var(--muted); margin-bottom:6px; display:block; font-weight:500; }
.form-input {
  width:100%; padding:14px 16px; background:var(--dark4);
  border:1px solid var(--border); border-radius:12px;
  color:var(--text); font-family:inherit; font-size:15px;
  transition:all 0.3s; outline:none;
}
.form-input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(212,175,55,0.1); }

.btn {
  width:100%; padding:15px; border:none; border-radius:12px;
  cursor:pointer; font-family:inherit; font-size:16px;
  font-weight:700; transition:all 0.3s; position:relative;
  overflow:hidden;
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: var(--dark);
}
.btn-gold:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(212,175,55,0.4); }
.btn-ghost {
  background:transparent; color:var(--gold);
  border:1px solid var(--border); margin-top:8px;
}
.btn-ghost:hover { background:rgba(212,175,55,0.08); }
.btn:active { transform:scale(0.98); }

.toggle-auth { text-align:center; margin-top:16px; font-size:13px; color:var(--muted); }
.toggle-auth span { color:var(--gold); cursor:pointer; font-weight:600; }
.toggle-auth span:hover { text-decoration:underline; }

/* ===== TOAST ===== */
#toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px);
  padding:14px 24px; border-radius:50px; font-size:14px; font-weight:600;
  z-index:9999; transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none; white-space:nowrap; max-width:90vw;
}
#toast.show { transform:translateX(-50%) translateY(0); }
#toast.success { background:var(--green); color:#fff; }
#toast.error { background:var(--red); color:#fff; }
#toast.info { background:var(--gold); color:var(--dark); }

/* ===== NAV ===== */
.navbar {
  position:sticky; top:0; z-index:100;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  display:flex; align-items:center; justify-content:space-between;
  height:64px;
}
.nav-logo {
  font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:4px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.nav-actions { display:flex; align-items:center; gap:12px; }
.nav-btn {
  padding:8px 16px; border-radius:50px; border:none;
  cursor:pointer; font-family:inherit; font-size:13px;
  font-weight:600; transition:all 0.3s;
}
.nav-lang { background:var(--dark3); color:var(--gold); border:1px solid var(--border); }
.nav-logout { background:rgba(192,57,43,0.2); color:#e74c3c; border:1px solid rgba(192,57,43,0.3); }
.nav-logout:hover { background:rgba(192,57,43,0.35); }
.nav-cart-btn {
  position:relative; background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--dark); padding:8px 16px; border-radius:50px;
  display:flex; align-items:center; gap:6px;
}
.cart-badge {
  position:absolute; top:-6px; right:-6px;
  background:var(--red); color:#fff; font-size:11px; font-weight:700;
  width:20px; height:20px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  display:none;
}
.cart-badge.show { display:flex; }

/* ===== CUSTOMER ===== */
#customer-page { background: var(--dark); }
.hero-banner {
  background: linear-gradient(135deg, #1A0E00, #0A0A0A);
  padding:40px 20px;
  text-align:center;
  position:relative; overflow:hidden;
}
.hero-banner::before {
  content:'';
  position:absolute; inset:0;
  background: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.12) 0%, transparent 70%);
}
.hero-title { font-size:clamp(24px,6vw,48px); font-weight:900; position:relative;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.hero-sub { color:var(--muted); font-size:14px; position:relative; margin-top:8px; }

.categories {
  display:flex; gap:10px; padding:20px; overflow-x:auto;
  scrollbar-width:none; -ms-overflow-style:none;
}
.categories::-webkit-scrollbar { display:none; }
.cat-btn {
  padding:10px 20px; border-radius:50px; border:1px solid var(--border);
  background:var(--dark3); color:var(--muted); cursor:pointer;
  font-family:inherit; font-size:14px; font-weight:600;
  white-space:nowrap; transition:all 0.3s; flex-shrink:0;
}
.cat-btn.active, .cat-btn:hover {
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--dark); border-color:transparent;
}

.menu-grid {
  display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap:20px; padding:20px;
}
.menu-card {
  background:var(--dark3); border:1px solid var(--border);
  border-radius:20px; overflow:hidden;
  transition:all 0.3s; cursor:pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.menu-card:hover {
  transform:translateY(-6px);
  box-shadow:0 16px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.3);
  border-color: rgba(212,175,55,0.4);
}
.card-img {
  width:100%; height:180px; object-fit:cover;
  background:var(--dark4);
}
.card-img-placeholder {
  width:100%; height:180px; background:var(--dark4);
  display:flex; align-items:center; justify-content:center;
  font-size:48px;
}
.card-body { padding:16px; }
.card-name { font-size:17px; font-weight:700; margin-bottom:4px; }
.card-cat { font-size:12px; color:var(--muted); margin-bottom:12px; }
.card-footer { display:flex; align-items:center; justify-content:space-between; }
.card-price {
  font-family:'Bebas Neue',sans-serif; font-size:24px;
  color:var(--gold); letter-spacing:1px;
}
.card-price span { font-family:inherit; font-size:13px; color:var(--muted); }
.add-btn {
  width:40px; height:40px; border-radius:50%; border:none;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--dark); font-size:22px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; transition:all 0.3s;
}
.add-btn:hover { transform:scale(1.15) rotate(90deg); }

/* ===== CART DRAWER ===== */
.drawer-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7);
  z-index:200; opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.drawer-overlay.open { opacity:1; pointer-events:all; }

.cart-drawer {
  position:fixed; top:0; bottom:0; z-index:201;
  width:min(400px,92vw); background:var(--dark2);
  display:flex; flex-direction:column;
  transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow: -8px 0 40px rgba(0,0,0,0.5);
  /* دايماً على اليمين */
  right:0; left:auto;
  border-left:1px solid var(--border);
  transform:translateX(100%);
}
.cart-drawer.open { transform:translateX(0) !important; }

.drawer-header {
  padding:20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.drawer-title { font-size:20px; font-weight:800; color:var(--gold); }
.close-btn {
  width:36px; height:36px; border-radius:50%; border:1px solid var(--border);
  background:var(--dark3); color:var(--text); cursor:pointer; font-size:18px;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
}
.close-btn:hover { background:var(--red); border-color:var(--red); }

.drawer-items { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
.drawer-item {
  background:var(--dark3); border:1px solid var(--border);
  border-radius:14px; padding:14px;
  display:flex; align-items:center; gap:12px;
}
.item-img { width:56px; height:56px; border-radius:10px; object-fit:cover; background:var(--dark4); flex-shrink:0; }
.item-info { flex:1; min-width:0; }
.item-name { font-size:14px; font-weight:600; }
.item-price { font-size:13px; color:var(--gold); margin-top:2px; }
.qty-control { display:flex; align-items:center; gap:8px; margin-top:8px; }
.qty-btn {
  width:28px; height:28px; border-radius:50%; border:1px solid var(--border);
  background:var(--dark4); color:var(--text); cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center; font-weight:700;
  transition:all 0.2s;
}
.qty-btn:hover { border-color:var(--gold); color:var(--gold); }
.qty-num { font-weight:700; min-width:20px; text-align:center; }
.item-del {
  width:32px; height:32px; border-radius:50%; border:none;
  background:rgba(192,57,43,0.15); color:var(--red); cursor:pointer;
  font-size:16px; transition:all 0.2s; flex-shrink:0;
}
.item-del:hover { background:rgba(192,57,43,0.3); }

.drawer-footer {
  padding:20px; border-top:1px solid var(--border);
  display:flex; flex-direction:column; gap:12px;
}
.total-row { display:flex; justify-content:space-between; align-items:center; }
.total-label { font-size:15px; color:var(--muted); }
.total-amount {
  font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold);
  letter-spacing:1px;
}
.empty-cart { text-align:center; padding:40px 20px; color:var(--muted); }
.empty-icon { font-size:48px; margin-bottom:12px; opacity:0.5; }

/* ===== ORDERS ===== */
#orders-page { background:var(--dark); padding:20px; }
.section-title {
  font-size:22px; font-weight:800; color:var(--gold);
  margin-bottom:16px; display:flex; align-items:center; gap:10px;
}
.orders-list { display:flex; flex-direction:column; gap:16px; }
.order-card {
  background:var(--dark3); border:1px solid var(--border);
  border-radius:20px; overflow:hidden;
}
.order-header {
  padding:16px 20px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.order-id { font-size:13px; color:var(--muted); }
.order-date { font-size:12px; color:var(--muted); }
.status-badge {
  padding:5px 12px; border-radius:50px; font-size:12px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.5px;
}
.status-pending { background:rgba(212,175,55,0.2); color:var(--gold); }
.status-accepted { background:rgba(39,174,96,0.2); color:var(--green); }
.status-rejected { background:rgba(192,57,43,0.2); color:var(--red); }
.status-delivered { background:rgba(52,152,219,0.2); color:#3498db; }

.order-items-list { padding:16px 20px; display:flex; flex-direction:column; gap:8px; }
.oi-row { display:flex; justify-content:space-between; font-size:14px; }
.oi-name { color:var(--text); }
.oi-qty { color:var(--muted); }
.oi-price { color:var(--gold); font-weight:600; }
.order-total-row {
  padding:12px 20px; border-top:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
}
.order-actions { padding:12px 20px; border-top:1px solid var(--border); display:flex; gap:8px; }
.order-actions.hidden { display:none; }
.btn-sm {
  padding:8px 16px; border-radius:10px; border:none;
  cursor:pointer; font-family:inherit; font-size:13px; font-weight:600;
  transition:all 0.2s;
}
.btn-delete { background:rgba(192,57,43,0.2); color:var(--red); }
.btn-delete:hover { background:rgba(192,57,43,0.35); }
.btn-chat { background:rgba(212,175,55,0.2); color:var(--gold); }
.btn-chat:hover { background:rgba(212,175,55,0.35); }

/* ===== WAITER ===== */
#waiter-page { background:var(--dark); }
.waiter-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; padding:20px; }
.waiter-card {
  background:var(--dark3); border:1px solid var(--border);
  border-radius:20px; overflow:hidden; transition:all 0.3s;
}
.waiter-card:hover { border-color:rgba(212,175,55,0.4); }
.new-order-badge {
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--dark); text-align:center; padding:6px;
  font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase;
  animation: shimmer 2s infinite;
}
@keyframes shimmer {
  0%,100%{opacity:1} 50%{opacity:0.7}
}
.waiter-card-header { padding:16px 20px; border-bottom:1px solid var(--border); }
.customer-name { font-size:17px; font-weight:700; }
.order-meta { font-size:12px; color:var(--muted); margin-top:4px; }
.waiter-actions { padding:12px 20px; display:flex; gap:8px; }
.btn-accept { background:rgba(39,174,96,0.2); color:var(--green); }
.btn-accept:hover { background:rgba(39,174,96,0.35); }
.btn-reject { background:rgba(192,57,43,0.2); color:var(--red); }
.btn-reject:hover { background:rgba(192,57,43,0.35); }

/* ===== CHAT ===== */
.chat-modal {
  position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,0.8);
  display:flex; align-items:center; justify-content:center;
  padding:20px; opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.chat-modal.open { opacity:1; pointer-events:all; }
.chat-box {
  background:var(--dark2); border:1px solid var(--border);
  border-radius:24px; width:min(480px,100%);
  height:min(600px,80vh); display:flex; flex-direction:column;
  box-shadow:var(--shadow); transform:scale(0.95);
  transition:transform 0.3s;
}
.chat-modal.open .chat-box { transform:scale(1); }
.chat-header {
  padding:16px 20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.chat-title { font-size:17px; font-weight:700; color:var(--gold); }
.chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
.msg { max-width:75%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.5; }
.msg.mine { align-self:flex-end; background:linear-gradient(135deg,rgba(212,175,55,0.3),rgba(240,192,96,0.2)); border:1px solid rgba(212,175,55,0.3); }
.msg.theirs { align-self:flex-start; background:var(--dark3); border:1px solid var(--border); }
.msg-time { font-size:10px; color:var(--muted); margin-top:4px; }
.chat-input-row { padding:16px; border-top:1px solid var(--border); display:flex; gap:10px; }
.chat-input {
  flex:1; padding:12px 16px; background:var(--dark3);
  border:1px solid var(--border); border-radius:12px;
  color:var(--text); font-family:inherit; font-size:14px; outline:none;
}
.chat-input:focus { border-color:var(--gold); }
.send-btn {
  width:44px; height:44px; border-radius:12px; border:none;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--dark); cursor:pointer; font-size:18px;
  display:flex; align-items:center; justify-content:center; transition:all 0.2s;
}
.send-btn:hover { transform:scale(1.1); }

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(10,10,10,0.95); backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex; justify-content:space-around; padding:8px 0;
  padding-bottom:max(8px, env(safe-area-inset-bottom));
}
.bnav-btn {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:8px 16px; border:none; background:transparent;
  cursor:pointer; color:var(--muted); transition:all 0.2s;
  font-family:inherit; font-size:11px; font-weight:600;
  border-radius:12px; min-width:60px;
}
.bnav-btn.active, .bnav-btn:hover { color:var(--gold); }
.bnav-btn.active .bnav-icon { filter:drop-shadow(0 0 8px rgba(212,175,55,0.6)); }
.bnav-icon { font-size:22px; }

/* ===== LOADER ===== */
#loader {
  position:fixed; inset:0; z-index:9999;
  background:var(--dark);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
.loader-logo {
  font-family:'Bebas Neue',sans-serif; font-size:72px; letter-spacing:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation: fadeInUp 0.8s ease forwards;
}
.loader-bar { width:200px; height:3px; background:var(--dark3); border-radius:2px; overflow:hidden; }
.loader-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); width:0; transition:width 0.5s ease; }
@keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--dark3); }
::-webkit-scrollbar-thumb { background:var(--gold); border-radius:2px; }

/* ===== ANIMATIONS ===== */
.fade-in { animation:fadeInUp 0.4s ease forwards; }
@keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.card-anim { animation:cardIn 0.4s ease forwards; }

/* ===== EMPTY STATE ===== */
.empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
.empty-state-icon { font-size:64px; opacity:0.4; margin-bottom:16px; }
.empty-state-text { font-size:16px; }

/* ===== CLICK RIPPLE ===== */
.ripple { position:absolute; border-radius:50%; transform:scale(0);
  animation:ripple-anim 0.6s linear; background:rgba(212,175,55,0.3); pointer-events:none; }
@keyframes ripple-anim { to{transform:scale(4);opacity:0} }

/* ===== SUPABASE CONFIG NOTICE ===== */
.config-notice {

  border-radius:14px; padding:16px; margin-bottom:20px;

}

/* ===== RESPONSIVE ===== */
@media(max-width:600px) {
  .menu-grid { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); }
  .cart-drawer { width:100vw; }

/* RTL/LTR adjustments */
body.ltr .drawer-title, body.ltr .section-title { font-family:'Outfit',sans-serif; }
body.ltr .card-name, body.ltr .customer-name { font-family:'Outfit',sans-serif; }

<script>
// ============================================================
//  ⚡ SUPABASE CONFIG — غيّر هاي القيم بمفاتيحك
// ============================================================
const SUPABASE_URL = 'https://cekksxloqkmyzppifxyn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNla2tzeGxvcWtteXpwcGlmeHluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTkzOTMsImV4cCI6MjA5NDc3NTM5M30.k-XW8z7Y7CUv2cj-effJYBiKLMcsxIfyxaYJTE0mzbw';
// ============================================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== STATE =====
let currentUser = null;
let currentProfile = null;
let currentLang = 'ar';
let selectedRole = 'customer';
let isRegister = false;
let cart = [];
let allMenuItems = [];
let currentFilter = 'all';
let activeChatOrderId = null;
let chatChannel = null;
let waiterOrdersChannel = null;

// ===== AUDIO =====
function playClick() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.1);
    g.gain.setValueAtTime(0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o.start(); o.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

document.addEventListener('click', function(e) {
  playClick();
  const btn = e.target.closest('button, .menu-card, .role-card');
  if (!btn) return;
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  btn.style.position = 'relative';
  btn.style.overflow = 'hidden';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 700);
});

// ===== LANG =====
function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.body.classList.toggle('ltr', lang === 'en');
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-ar],[data-en]').forEach(el => {
    const txt = el.getAttribute('data-'+lang);
    if (txt) el.textContent = txt;
  });
  document.querySelectorAll('.lang-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&lang==='ar')||(i===1&&lang==='en')));
  if (allMenuItems.length) renderMenu(allMenuItems);
  updateChatPlaceholder();
}
function toggleLang() { setLang(currentLang === 'ar' ? 'en' : 'ar'); }
function t(ar, en) { return currentLang === 'ar' ? ar : en; }
function updateChatPlaceholder() {
  const ci = document.getElementById('chatInput');
  if (ci) ci.placeholder = t('اكتب رسالة...', 'Type a message...');
}

// ===== AUTH MODE =====
function selectRole(role, el) {
  selectedRole = role;
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function toggleAuthMode() {
  isRegister = !isRegister;
  const nameInput = document.getElementById('nameInput');
  const toggleBtn = document.getElementById('toggleBtnText');
  const authBtn = document.getElementById('authBtn').querySelector('span');
  if (isRegister) {
    nameInput.style.display = 'block';
    nameInput.placeholder = t('أدخل اسمك الكامل', 'Enter your full name');
    toggleBtn.setAttribute('data-ar', 'لديك حساب؟ سجل دخول');
    toggleBtn.setAttribute('data-en', 'Have an account? Sign In');
    authBtn.setAttribute('data-ar', 'إنشاء حساب');
    authBtn.setAttribute('data-en', 'Register');
  } else {
    nameInput.style.display = 'none';
    toggleBtn.setAttribute('data-ar', 'ليس لديك حساب؟ سجل الآن');
    toggleBtn.setAttribute('data-en', 'No account? Register');
    authBtn.setAttribute('data-ar', 'دخول');
    authBtn.setAttribute('data-en', 'Sign In');
  }
  setLang(currentLang);
}

// ===== AUTH =====
async function handleAuth() {
  const email = document.getElementById('emailInput').value.trim();
  const pass = document.getElementById('passInput').value;
  const name = document.getElementById('nameInput').value.trim();
  if (!email || !pass) { showToast(t('أدخل الإيميل وكلمة المرور','Enter email & password'), 'error'); return; }

  const btn = document.getElementById('authBtn');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span>';

  try {
    if (isRegister) {
      if (!name) { showToast(t('أدخل اسمك','Enter your name'), 'error'); btn.disabled=false; setLang(currentLang); return; }
      const { data, error } = await sb.auth.signUp({ email, password: pass });
      if (error) throw error;
      if (data.user) {
        await sb.from('profiles').upsert({ id: data.user.id, full_name: name, role: selectedRole, language: currentLang });
        showToast(t('تم إنشاء الحساب! تحقق من إيميلك','Account created! Check your email'), 'success');
      }
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      await loadProfile(data.user);
    }
  } catch(e) {
    const msg = e.message.includes('Invalid') ? t('إيميل أو كلمة مرور خاطئة','Wrong email or password') :
                e.message.includes('Email not confirmed') ? t('تحقق من إيميلك أولاً','Please verify your email first') :
                e.message.includes('already registered') ? t('هذا الإيميل مسجل مسبقاً','Email already registered') :
                e.message;
    showToast(msg, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<span data-ar="${isRegister?'إنشاء حساب':'دخول'}" data-en="${isRegister?'Register':'Sign In'}">${isRegister?t('إنشاء حساب','Register'):t('دخول','Sign In')}</span>`;
  }
}

async function loadProfile(user) {
  currentUser = user;
  const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (!data) { showToast(t('لم يتم العثور على الملف الشخصي','Profile not found'), 'error'); return; }
  currentProfile = data;
  if (data.language) setLang(data.language);
  if (data.role === 'waiter') showWaiterPage();
  else showCustomerPage();
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null; currentProfile = null;
  cart = [];
  if (waiterOrdersChannel) sb.removeChannel(waiterOrdersChannel);
  showPage('landing');
  showToast(t('تم تسجيل الخروج','Logged out'), 'info');
}

// ===== PAGES =====
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pg = document.getElementById(id);
  if (pg) { pg.classList.add('active'); pg.classList.add('fade-in'); }
}

function showCustomerPage() {
  showPage('customer-page');
  document.getElementById('greetMsg').textContent = t(`أهلاً ${currentProfile.full_name}! اختر ما يشهيك 😋`, `Hello ${currentProfile.full_name}! Choose your favorites 😋`);
  loadMenu();
}

function showWaiterPage() {
  showPage('waiter-page');
  loadWaiterOrders();
  subscribeWaiterOrders();
}

function showSubPage(sub) {
  if (sub === 'menu') {
    showPage('customer-page');
    document.getElementById('menuNavBtn')?.classList.add('active');
    document.getElementById('menuNavBtn2')?.classList.add('active');
    document.getElementById('ordersNavBtn')?.classList.remove('active');
    document.getElementById('ordersNavBtn2')?.classList.remove('active');
  } else {
    showPage('orders-page');
    loadMyOrders();
    document.getElementById('ordersNavBtn')?.classList.add('active');
    document.getElementById('ordersNavBtn2')?.classList.add('active');
    document.getElementById('menuNavBtn')?.classList.remove('active');
    document.getElementById('menuNavBtn2')?.classList.remove('active');
  }
}

// ===== MENU =====
async function loadMenu() {
  const { data } = await sb.from('menu_items').select('*').eq('available', true);
  if (!data) return;
  allMenuItems = data;
  renderCategories(data);
  renderMenu(data);
}

function renderCategories(items) {
  const cats = ['all', ...new Set(items.map(i => currentLang === 'ar' ? i.category_ar : i.category_en))];
  const row = document.getElementById('categoriesRow');
  row.innerHTML = cats.map(c => `
    <button class="cat-btn ${c==='all'?'active':''}" onclick="filterMenu('${c}',this)">
      ${c === 'all' ? t('الكل','All') : c}
    </button>`).join('');
}

function filterMenu(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const filtered = cat === 'all' ? allMenuItems :
    allMenuItems.filter(i => (currentLang==='ar'?i.category_ar:i.category_en) === cat);
  renderMenu(filtered);
}

function renderMenu(items) {
  const grid = document.getElementById('menuGrid');
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">🍽️</div>
      <div class="empty-state-text">${t('لا توجد أصناف','No items found')}</div>
    </div>`;
    return;
  }
  grid.innerHTML = items.map((item, idx) => `
    <div class="menu-card card-anim" style="animation-delay:${idx*0.05}s">
      ${item.image_url
        ? `<img class="card-img" src="${item.image_url}" alt="${item.name_ar}" loading="lazy" onerror="this.parentElement.querySelector('.card-img-placeholder').style.display='flex';this.style.display='none'">`
        : ''
      }
      <div class="card-img-placeholder" style="display:${item.image_url?'none':'flex'}">🍽️</div>
      <div class="card-body">
        <div class="card-name">${currentLang==='ar' ? item.name_ar : item.name_en}</div>
        <div class="card-cat">${currentLang==='ar' ? item.category_ar : item.category_en}</div>
        <div class="card-footer">
          <div class="card-price">${item.price} <span>IQD</span></div>
          <button class="add-btn" onclick="addToCart('${item.id}');event.stopPropagation()">+</button>
        </div>
      </div>
    </div>`).join('');
}

// ===== CART =====
function addToCart(itemId) {
  const item = allMenuItems.find(i => i.id === itemId);
  if (!item) return;
  const ex = cart.find(c => c.id === itemId);
  if (ex) ex.qty++;
  else cart.push({ ...item, qty: 1 });
  updateCartBadge();
  showToast(t(`✅ أُضيف: ${item.name_ar}`, `✅ Added: ${item.name_en}`), 'success');
}

function updateCartBadge() {
  const total = cart.reduce((s,i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.classList.toggle('show', total > 0);
}

function toggleCart() {
  const drawer = document.getElementById('cartDrawer');
  const overlay = document.getElementById('cartOverlay');
  const isOpen = drawer.classList.contains('open');
  if (!isOpen) renderCartItems();
  drawer.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
}

function closeCart() {
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
}

function renderCartItems() {
  const container = document.getElementById('cartItems');
  const totalEl = document.getElementById('cartTotal');
  if (!cart.length) {
    container.innerHTML = `<div class="empty-cart">
      <div class="empty-icon">🛒</div>
      <div>${t('السلة فارغة','Cart is empty')}</div>
    </div>`;
    totalEl.textContent = '0 IQD';
    return;
  }
  container.innerHTML = cart.map(item => `
    <div class="drawer-item">
      ${item.image_url ? `<img class="item-img" src="${item.image_url}" alt="">` : '<div class="item-img" style="display:flex;align-items:center;justify-content:center;font-size:24px">🍽️</div>'}
      <div class="item-info">
        <div class="item-name">${currentLang==='ar'?item.name_ar:item.name_en}</div>
        <div class="item-price">${item.price * item.qty} IQD</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty('${item.id}',-1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
        </div>
      </div>
      <button class="item-del" onclick="removeFromCart('${item.id}')">🗑️</button>
    </div>`).join('');
  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
  totalEl.textContent = total + ' IQD';
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  updateCartBadge();
  renderCartItems();
}

function removeFromCart(id) {
  cart = cart.filter(i => i.id !== id);
  updateCartBadge();
  renderCartItems();
}

async function placeOrder() {
  if (!cart.length) { showToast(t('السلة فارغة!','Cart is empty!'), 'error'); return; }
  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
  try {
    const { data: order, error: oErr } = await sb.from('orders').insert({
      customer_id: currentUser.id, total, status: 'pending'
    }).select().single();
    if (oErr) throw oErr;
    const items = cart.map(i => ({ order_id: order.id, menu_item_id: i.id, quantity: i.qty, price: i.price }));
    await sb.from('order_items').insert(items);
    cart = [];
    updateCartBadge();
    toggleCart();
    showToast(t('✅ تم تسجيل طلبك! سينتظر موافقة النادل','✅ Order placed! Waiting for waiter approval'), 'success');
  } catch(e) {
    showToast(t('حدث خطأ: ','Error: ') + e.message, 'error');
  }
}

// ===== MY ORDERS =====
async function loadMyOrders() {
  const { data: orders } = await sb.from('orders').select('*').eq('customer_id', currentUser.id).order('created_at', { ascending: false });
  const list = document.getElementById('ordersList');
  if (!orders || !orders.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">${t('لا توجد طلبات','No orders yet')}</div></div>`;
    return;
  }
  const statusLabels = {
    ar: { pending:'قيد الانتظار', accepted:'تم القبول', rejected:'مرفوض', delivered:'تم التسليم' },
    en: { pending:'Pending', accepted:'Accepted', rejected:'Rejected', delivered:'Delivered' }
  };
  let html = '';
  for (const order of orders) {
    const { data: items } = await sb.from('order_items').select('*, menu_items(name_ar,name_en)').eq('order_id', order.id);
    const statusClass = `status-${order.status}`;
    const statusText = statusLabels[currentLang][order.status] || order.status;
    const canEdit = order.status === 'pending';
    html += `
    <div class="order-card" id="order-${order.id}">
      <div class="order-header">
        <div>
          <div class="order-id">#${order.id.slice(0,8).toUpperCase()}</div>
          <div class="order-date">${new Date(order.created_at).toLocaleDateString(currentLang==='ar'?'ar-IQ':'en-US')}</div>
        </div>
        <span class="status-badge ${statusClass}">${statusText}</span>
      </div>
      <div class="order-items-list">
        ${(items||[]).map(i => `
          <div class="oi-row">
            <span class="oi-name">${currentLang==='ar'?i.menu_items.name_ar:i.menu_items.name_en}</span>
            <span class="oi-qty">×${i.quantity}</span>
            <span class="oi-price">${i.price * i.quantity} IQD</span>
          </div>`).join('')}
      </div>
      <div class="order-total-row">
        <span>${t('المجموع','Total')}</span>
        <strong style="color:var(--gold);font-size:18px">${order.total} IQD</strong>
      </div>
      <div class="order-actions ${canEdit?'':'hidden'}">
        <button class="btn-sm btn-delete" onclick="deleteOrder('${order.id}')">🗑️ ${t('حذف الطلب','Delete Order')}</button>
        <button class="btn-sm btn-chat" onclick="openChat('${order.id}','${currentProfile.full_name}')">💬 ${t('مراسلة النادل','Chat with Waiter')}</button>
      </div>
      ${!canEdit ? `<div class="order-actions"><button class="btn-sm btn-chat" onclick="openChat('${order.id}','${currentProfile.full_name}')">💬 ${t('مراسلة النادل','Chat with Waiter')}</button></div>` : ''}
    </div>`;
  }
  list.innerHTML = html;
}

async function deleteOrder(orderId) {
  if (!confirm(t('هل تريد حذف الطلب؟','Delete this order?'))) return;
  await sb.from('orders').delete().eq('id', orderId).eq('status', 'pending');
  showToast(t('تم حذف الطلب','Order deleted'), 'info');
  loadMyOrders();
}

// ===== WAITER =====
async function loadWaiterOrders() {
  const { data: orders } = await sb.from('orders').select('*, profiles(full_name)').in('status',['pending','accepted']).order('created_at', { ascending: false });
  const grid = document.getElementById('waiterGrid');
  if (!orders || !orders.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🎉</div><div class="empty-state-text">${t('لا توجد طلبات جديدة','No new orders')}</div></div>`;
    return;
  }
  let html = '';
  for (const order of orders) {
    const { data: items } = await sb.from('order_items').select('*, menu_items(name_ar,name_en)').eq('order_id', order.id);
    const isPending = order.status === 'pending';
    html += `
    <div class="waiter-card">
      ${isPending ? `<div class="new-order-badge">🔔 ${t('طلب جديد','NEW ORDER')}</div>` : ''}
      <div class="waiter-card-header">
        <div class="customer-name">👤 ${order.profiles?.full_name || t('زبون','Customer')}</div>
        <div class="order-meta">#${order.id.slice(0,8).toUpperCase()} · ${new Date(order.created_at).toLocaleTimeString(currentLang==='ar'?'ar-IQ':'en-US')}</div>
      </div>
      <div class="order-items-list">
        ${(items||[]).map(i => `
          <div class="oi-row">
            <span class="oi-name">${currentLang==='ar'?i.menu_items.name_ar:i.menu_items.name_en}</span>
            <span class="oi-qty">×${i.quantity}</span>
            <span class="oi-price">${i.price*i.quantity} IQD</span>
          </div>`).join('')}
      </div>
      <div class="order-total-row">
        <span>${t('المجموع','Total')}</span>
        <strong style="color:var(--gold);font-size:18px">${order.total} IQD</strong>
      </div>
      <div class="order-actions">
        ${isPending ? `
          <button class="btn-sm btn-accept" onclick="updateOrderStatus('${order.id}','accepted')">✅ ${t('قبول','Accept')}</button>
          <button class="btn-sm btn-reject" onclick="updateOrderStatus('${order.id}','rejected')">❌ ${t('رفض','Reject')}</button>
        ` : `
          <button class="btn-sm btn-accept" onclick="updateOrderStatus('${order.id}','delivered')">🚀 ${t('تسليم','Deliver')}</button>
        `}
        <button class="btn-sm btn-chat" onclick="openChat('${order.id}','${order.profiles?.full_name||'Customer'}')">💬 ${t('مراسلة','Chat')}</button>
      </div>
    </div>`;
  }
  grid.innerHTML = html;
}

async function updateOrderStatus(orderId, status) {
  await sb.from('orders').update({ status }).eq('id', orderId);
  showToast(t('تم تحديث حالة الطلب','Order status updated'), 'success');
  loadWaiterOrders();
}

function subscribeWaiterOrders() {
  waiterOrdersChannel = sb.channel('orders-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => {
      loadWaiterOrders();
    })
    .subscribe();
}

// ===== CHAT =====
function openChat(orderId, partnerName) {
  activeChatOrderId = orderId;
  document.getElementById('chatTitle').textContent = `💬 ${partnerName}`;
  document.getElementById('chatModal').classList.add('open');
  loadMessages(orderId);
  subscribeChat(orderId);
  updateChatPlaceholder();
}

function closeChat() {
  document.getElementById('chatModal').classList.remove('open');
  activeChatOrderId = null;
  if (chatChannel) { sb.removeChannel(chatChannel); chatChannel = null; }
}

async function loadMessages(orderId) {
  const { data } = await sb.from('messages').select('*, profiles(full_name)').eq('order_id', orderId).order('created_at');
  renderMessages(data || []);
}

function renderMessages(msgs) {
  const container = document.getElementById('chatMessages');
  if (!msgs.length) {
    container.innerHTML = `<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px">${t('لا توجد رسائل بعد','No messages yet')}</div>`;
    return;
  }
  container.innerHTML = msgs.map(m => {
    const isMine = m.sender_id === currentUser.id;
    const time = new Date(m.created_at).toLocaleTimeString(currentLang==='ar'?'ar-IQ':'en-US', {hour:'2-digit',minute:'2-digit'});
    return `<div class="msg ${isMine?'mine':'theirs'}">
      ${m.content}
      <div class="msg-time">${m.profiles?.full_name || ''} · ${time}</div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content || !activeChatOrderId) return;
  input.value = '';
  await sb.from('messages').insert({ order_id: activeChatOrderId, sender_id: currentUser.id, content });
}

function subscribeChat(orderId) {
  if (chatChannel) sb.removeChannel(chatChannel);
  chatChannel = sb.channel(`chat-${orderId}`)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `order_id=eq.${orderId}` }, () => {
      loadMessages(orderId);
    })
    .subscribe();
}

// ===== TOAST =====
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== LOADER =====
async function initApp() {
  // تأكد السلة مسكرة عند البداية
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');

  const fill = document.getElementById('loaderFill');
  fill.style.width = '30%';
  setTimeout(() => fill.style.width = '70%', 300);
  const { data: { user } } = await sb.auth.getUser();
  fill.style.width = '100%';
  await new Promise(r => setTimeout(r, 500));
  document.getElementById('loader').style.display = 'none';
  if (user) await loadProfile(user);
  else showPage('landing');
  setLang('ar');
}

initApp();
</script>
